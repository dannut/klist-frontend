server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: In nginx, add_header in a location block REPLACES server-level headers.
    # All security headers must be repeated in every location that needs them,
    # or defined here at server level and only set `always` so they apply to all responses.

    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # CSP as HTTP header — more robust than meta tag in HTML.
    # Must be a single line in nginx (no multiline support for add_header value).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Proxy API to backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://${BACKEND_URL}:8080; 
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 35s;
        proxy_send_timeout 10s;
    }

    # ── Proxy install.sh to backend ───────────────────────────────────────────
    location = /install.sh {
        proxy_pass         http://kli-backend.kli.svc.cluster.local:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Static files ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets — must repeat security headers because location
    # blocks override server-level add_header directives in nginx.
    location ~* \.(css|js|ico|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control            "public, immutable"                  always;
        add_header X-Content-Type-Options   "nosniff"                            always;
        add_header X-Frame-Options          "DENY"                               always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"    always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }


    # ── Proxy releases to backend ─────────────────────────────────────────────────
    location /releases/ {
        proxy_pass         http://kli-backend.kli.svc.cluster.local:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
}
