name: Pipeline 2 — Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'src/**'
      - 'nginx.conf'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Autentificare la GitHub Container Registry
      # https://github.com/marketplace/actions/docker-login
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Genereaza tag-urile imaginii — staging-latest si staging-<SHA>
      # https://github.com/marketplace/actions/docker-metadata-action
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - uses: docker/setup-buildx-action@v3

      # Construieste imaginea Docker si o trimite la GHCR
      # https://github.com/marketplace/actions/build-and-push-docker-images
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      # Checkout klist-infra pentru a actualiza tag-ul imaginii
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: staging
          token: ${{ secrets.INFRA_TOKEN }}

      # Actualizeaza tag-ul imaginii in manifestul de staging
      # ArgoCD detecteaza schimbarea si deployeaza automat
      - name: Update image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: ghcr.io/dannut/klist-frontend:.*|image: ghcr.io/dannut/klist-frontend:staging-${SHORT_SHA}|g" k8s/staging/03-frontend.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/staging/05-frontend.yaml
          git commit -m "ci: update frontend image to staging-${{ github.sha }}"
          git push

  integration-tests:
    name: Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Instaleaza Playwright si browserul Chromium
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # Asteapta ca staging-ul sa fie ready inainte de teste
      - name: Wait for staging
        run: |
          for i in $(seq 1 250); do
            curl -sf https://test.kli.st && exit 0
            echo "Attempt $i/24 — waiting 10s..."
            sleep 10
          done
          exit 1

      # Ruleaza testele UI Playwright pe staging live
      - name: Run Playwright tests
        env:
          BASE_URL: https://test.kli.st
        run: npx playwright test

      # Salveaza raportul Playwright ca artifact
      # https://github.com/marketplace/actions/upload-a-build-artifact
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy, integration-tests]
    if: failure()
    permissions:
      issues: write
    steps:
      # Creeaza un issue pe GitHub daca pipeline-ul esueaza
      # https://github.com/marketplace/actions/github-script
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Pipeline 2 esuat — ' + context.sha.substring(0, 7),
              body: '## Pipeline 2 — Staging esuat\n\n' +
                '| Job | Status |\n' +
                '|-----|--------|\n' +
                '| Build & Push | ${{ needs.build-push.result }} |\n' +
                '| Deploy | ${{ needs.deploy.result }} |\n' +
                '| Integration Tests | ${{ needs.integration-tests.result }} |\n\n' +
                '**Commit:** ' + context.sha + '\n' +
                '**Branch:** ' + context.ref,
              labels: ['ci-failure'],
            });
