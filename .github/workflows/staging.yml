name: Pipeline 2 — Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'src/**'
      - 'nginx.conf'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: staging-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: staging
          token: ${{ secrets.INFRA_TOKEN }}

      - name: Update image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          (cd k8s/overlays/staging && kustomize edit set image ghcr.io/dannut/klist-frontend=staging-${SHORT_SHA})

          git add k8s/overlays/staging/kustomization.yaml
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: update frontend image to staging-${SHORT_SHA}"
          git push

  integration-tests:
    name: Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Wait for staging
        run: |
          # Asteptam ca Ingress-ul sa raspunda cu 200 OK
          for i in $(seq 1 100); do
            curl -sf https://test.kli.st && exit 0
            echo "Attempt $i/100 — waiting 10s..."
            sleep 10
          done
          exit 1

      - name: Run Playwright tests
        env:
          BASE_URL: https://test.kli.st
        run: npx playwright test

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy, integration-tests]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Pipeline 2 Frontend esuat — ' + context.sha.substring(0, 7),
              body: '## Pipeline 2 (Frontend) — Staging esuat\
