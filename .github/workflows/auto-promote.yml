name: Pipeline 1 — CI & Auto-promote dev → staging

on:
  push:
    branches:
      - dev

concurrency:
  group: auto-promote-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  promote:
    name: Promote dev → staging
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.INFRA_TOKEN }}

      - name: Push dev to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:staging
