name: Pipeline 3 — Production Release

on:
  # Triggered when Release Please creates a new tag (e.g. v1.0.0)
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-frontend-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a production release

jobs:

  build-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dannut/klist-frontend
          tags: |
            # add "v" for Git compatibility (e.g. v1.0.0):
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # Always update latest on production
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENVIRONMENT=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: prod
      url: https://kli.st
    steps:
      - uses: actions/checkout@v6
        with:
          repository: dannut/klist-infra
          ref: main
          token: ${{ secrets.INFRA_TOKEN }}

      - name: Update production image tag & Create PR
        env:
          GH_TOKEN: ${{ secrets.INFRA_TOKEN }}
        run: |
          VERSION=${{ github.ref_name }}

          git checkout -b deploy-frontend-${VERSION}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          (cd k8s/overlays/production && kustomize edit set image ghcr.io/dannut/klist-frontend:${VERSION})

          git add k8s/overlays/production/kustomization.yaml
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: deploy frontend ${VERSION} to production"
          git push origin deploy-frontend-${VERSION}
          gh pr create --title "Deploy Frontend ${VERSION} to production" --body "Automated PR — frontend ${VERSION} → production" --base main --head deploy-frontend-${VERSION}

  sync-gcp-dr:
    name: Sync GCP-DR after rollout
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Wait for production rollout to complete
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Waiting for kli.st to run frontend $VERSION..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf https://kli.st/api/health | jq -r '.status' 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Production health check passed — assuming rollout ok"
              exit 0
            fi
            echo "Attempt $i/20: status=$STATUS — waiting 30s..."
            sleep 30
          done
          echo "Timeout: production health check failed"
          exit 1

      - name: Sync GCP-DR via kubectl
        run: |
          VERSION="${{ github.ref_name }}"
          IMAGE="ghcr.io/dannut/klist-frontend:${VERSION}"

          echo "${{ secrets.GCP_KUBECONFIG }}" > /tmp/gcp.yaml
          chmod 600 /tmp/gcp.yaml

          kubectl set image deployment/kli-frontend kli-frontend=${IMAGE} -n kli --kubeconfig /tmp/gcp.yaml
          kubectl rollout status deployment/kli-frontend -n kli --kubeconfig /tmp/gcp.yaml --timeout=5m

          rm -f /tmp/gcp.yaml
          echo "GCP-DR synced to frontend $VERSION"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: sync-gcp-dr
    if: success()
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '✅ Production Release ' + context.ref.replace('refs/tags/', ''),
              body: '## Production Release Successful\n\n' +
                '**Version:** ' + context.ref.replace('refs/tags/', '') + '\n' +
                '**Commit:** ' + context.sha + '\n' +
                '**URL:** https://kli.st\n\n' +
                'Frontend deployed to production successfully.',
              labels: ['release'],
            });

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: failure()
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Production Release FAILED — ' + context.ref.replace('refs/tags/', ''),
              body: '## ❌ Pipeline 3 esuat\n\n' +
                '| Job | Status |\n' +
                '|-----|--------|\n' +
                '| Build & Push | ${{ needs.build-push.result }} |\n' +
                '| Deploy | ${{ needs.deploy.result }} |\n\n' +
                '**Version:** ' + context.ref.replace('refs/tags/', '') + '\n' +
                '**Commit:** ' + context.sha,
              labels: ['ci-failure', 'release'],
            });
