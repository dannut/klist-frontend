name: Pipeline 1 — CI

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: ci-frontend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Ruleaza ESLint — verifica stilul si erorile de cod JavaScript
      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      # Ruleaza testele unitare cu vitest
      - name: Run tests
        run: npm test

  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: failure()
    permissions:
      pull-requests: write
    steps:
      # Adauga comentariu pe PR daca lint sau teste esueaza
      # https://github.com/marketplace/actions/create-or-update-comment
      - uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ❌ Pipeline 1 esuat

            | Job | Status |
            |-----|--------|
            | Lint | ${{ needs.lint.result }} |
            | Unit Tests | ${{ needs.unit-tests.result }} |

            **Commit:** ${{ github.event.pull_request.head.sha }}

            Verifica log-urile pentru detalii.